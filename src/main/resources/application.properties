spring.application.name=fileservice

# ─────────────────────────────────────────────
# SERVER
# ─────────────────────────────────────────────
server.port=8090
server.servlet.context-path=/

# Compress HTTP responses — faster network transfer
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/plain
server.compression.min-response-size=1024

# Timeout — drop slow/hanging requests after 60s
server.tomcat.connection-timeout=60000

# Max threads Tomcat uses to handle requests
# Too low = requests queue up | Too high = memory pressure
server.tomcat.threads.max=200
server.tomcat.threads.min-spare=10

# Max size of HTTP request headers (protects against header injection attacks)
server.tomcat.max-http-form-post-size=10MB

# ─────────────────────────────────────────────
# ORACLE DATABASE
# ─────────────────────────────────────────────
spring.datasource.url=jdbc:oracle:thin:@localhost:1521:XE
spring.datasource.username=SYSTEM
spring.datasource.password=AGRI1234
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# ─────────────────────────────────────────────
# CONNECTION POOL — HikariCP
# ─────────────────────────────────────────────
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.pool-name=FileServiceHikariPool

# ✅ NEW — Tests connection before handing it out from pool
# Prevents "connection closed" errors after Oracle drops idle connections
spring.datasource.hikari.connection-test-query=SELECT 1 FROM DUAL

# ✅ NEW — Keeps idle connections alive (Oracle drops them after ~30 min)
spring.datasource.hikari.keepalive-time=120000

# ✅ NEW — How long to wait to acquire a connection from pool before failing
spring.datasource.hikari.validation-timeout=5000

# ─────────────────────────────────────────────
# JPA / HIBERNATE — ORACLE SPECIFIC
# ─────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=none
spring.devtools.restart.enabled=false
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.id.new_generator_mappings=true
spring.jpa.properties.hibernate.globally_quoted_identifiers=false
spring.jpa.properties.hibernate.physical_naming_strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.open-in-view=false

# ✅ NEW — Batch inserts/updates — much faster for bulk DB operations
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# ✅ NEW — Second level cache disabled (safe default, enable later with Redis)
spring.jpa.properties.hibernate.cache.use_second_level_cache=false
spring.jpa.properties.hibernate.cache.use_query_cache=false

# ✅ NEW — Generate SQL statistics in logs (useful for performance tuning)
spring.jpa.properties.hibernate.generate_statistics=false

# ✅ NEW — Oracle CLOB/BLOB handling
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# ─────────────────────────────────────────────
# FILE STORAGE
# ─────────────────────────────────────────────
file.upload-dir=./uploads

# ✅ NEW — Allowed file types (read in FileStorageService for whitelist)
file.allowed-types=application/pdf,image/jpeg,image/png,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document

# ✅ NEW — Max file size in bytes (10 MB) — double-checked in service layer too
file.max-size-bytes=10485760

# ─────────────────────────────────────────────
# MULTIPART — File Upload
# ─────────────────────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=11MB
spring.servlet.multipart.file-size-threshold=2KB

# ─────────────────────────────────────────────
# LOGGING
# ─────────────────────────────────────────────
logging.level.root=INFO
logging.level.com.enterprise.fileservice=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ✅ NEW — Log file output (enterprise apps always log to file too)
logging.file.name=logs/fileservice.log
logging.file.max-size=10MB
logging.file.max-history=30
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ─────────────────────────────────────────────
# JACKSON — JSON Serialization
# ─────────────────────────────────────────────
spring.jackson.default-property-inclusion=NON_NULL
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=Asia/Kolkata

# ✅ NEW — Don't fail if JSON has unknown fields (forward compatibility)
spring.jackson.deserialization.fail-on-unknown-properties=false

# ✅ NEW — Allows empty strings to be treated as null
spring.jackson.deserialization.accept-empty-string-as-null-object=true

# ─────────────────────────────────────────────
# ERROR HANDLING
# ─────────────────────────────────────────────
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=ON_PARAM
server.error.include-exception=false

# ─────────────────────────────────────────────
# SECURITY — Basic Hardening
# ─────────────────────────────────────────────



# ─────────────────────────────────────────────
# ACTUATOR — Health Monitoring
# ─────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,metrics,loggers
management.endpoint.health.show-details=always

# ✅ NEW — Custom app info shown at /actuator/info
management.info.env.enabled=true
info.app.name=File Management Service
info.app.version=1.0.0
info.app.environment=development
# Tells Hibernate to ignore DDL errors like duplicate index names
spring.jpa.properties.hibernate.hbm2ddl.halt_on_error=false
# ✅ NEW — Actuator on separate port (security best practice)
# Prevents exposing /actuator on same port as your API
#management.server.port=9090

# ─────────────────────────────────────────────
# ASYNC — For future async file processing
# ─────────────────────────────────────────────

# ✅ NEW — Thread pool for @Async tasks
spring.task.execution.pool.core-size=5
spring.task.execution.pool.max-size=20
spring.task.execution.pool.queue-capacity=100
spring.task.execution.thread-name-prefix=FileAsync-
logging.level.org.springframework.security=TRACE
logging.level.org.springframework.security.oauth2=TRACE
